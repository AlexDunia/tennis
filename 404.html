<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const path = window.location.pathname.replace(/\/+$/, '')
      const repo = '/tennis'
      const redirectPath = `${repo}/?redirect=${encodeURIComponent(path + window.location.search + window.location.hash)}`
      window.location.replace(redirectPath)
    </script>
  </head>
  <body>Redirecting…</body>
</html>
